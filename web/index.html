<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis Full HUD</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="hud-wrapper" id="mainWrapper">
        
        <div class="side-panel">
            <div class="data-block">
                <div class="data-title">SYSTEM.INFO</div>
                <div id="cpuData">CPU: CALCULATING...</div>
                <div id="ramData">RAM: CALCULATING...</div>
                <div id="ramBar" style="width: 100%; height: 4px; background: rgba(0,229,255,0.2); margin-top: 5px;">
                    <div id="ramFill" style="width: 0%; height: 100%; background: var(--jarvis-cyan); box-shadow: var(--jarvis-glow); transition: width 0.5s;"></div>
                </div>
            </div>
            
            <div class="data-block">
                <div class="data-title">UPLINK.STATUS</div>
                <div>PING: <span style="color: #00ff00;">12ms</span></div>
                <div>PACKETS: SECURE</div>
            </div>

            <div class="data-block" style="margin-top: auto; margin-bottom: 10px; width: 100%; max-width: 280px;">
                <div class="data-title">LIVE.LOGS</div>
                <div id="miniConsole" style="height: 140px; width: 100%; overflow-y: hidden; text-align: left; font-size: 11px; color: #00e5ff; background: rgba(0,0,0,0.5); border: 1px solid rgba(0,229,255,0.2); padding: 8px; box-sizing: border-box; display: flex; flex-direction: column; gap: 4px;">
                    <div style="color: #00ff00;">>_ SYS.ONLINE</div>
                </div>
            </div>
        </div>

        <div class="center-panel">
            <div class="reactor-core">
                <div class="reactor-ring-1" id="ring1"></div>
                <div class="reactor-ring-2"></div>
            </div>

            <div class="command-container">
                <div id="greetingDisplay" style="color: var(--jarvis-cyan); font-size: 18px; margin-bottom: 20px; font-weight: bold; letter-spacing: 2px;">
                    INICIALIZANDO...
                </div>
                
                <div id="status">[ AWAITING_INPUT ]</div>
                <input type="text" id="commandInput" placeholder=">_ INGRESE COMANDO" autocomplete="off" spellcheck="false" autofocus>
                
                <div class="visualizer-container" id="audioViz"></div>
            </div>
        </div>

        <div class="side-panel" style="align-items: flex-end; text-align: right;">
            
            <div class="data-block" style="border-left: none; border-right: 2px solid var(--jarvis-cyan); padding-left: 0; padding-right: 10px;">
                <div class="data-title">MODULES.ACTIVE</div>
                <div>EXEC_ENGINE: ON</div>
                <div>PLANNER_AI: RUNNING</div>
                <div>MEMORY_DB: SYNCED</div>
            </div>

            <div style="margin-top: auto; font-size: 40px; color: #fff; opacity: 0.5;">
                <div id="clock">00:00</div>
            </div>
            
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
